"""
Peltier PID Controller — ItsyBitsy M0 (CircuitPython)
======================================================
Połączenia sterownika silnika (białe złącze):
  DIR1  → pin  3   (kierunek Peltiera)
  PWM1  → pin  4   (moc Peltiera)
  DIR2  → pin  5   (kierunek wentylatora)
  PWM2  → pin 11   (moc wentylatora)
  GND   → G

Połączenia wzmacniacza MAX31856 (SPI):
  SCK   → SCK
  SDO   → MISO
  SDI   → MOSI
  CS1   → pin  9   (czujnik 1)
  CS2   → pin 10   (czujnik 2)
  GND   → G
  VCC   → 3V

Komunikacja z PC: USB Serial (JSON, 115200 baud)
  ← odbiór komend JSON
  → wysyłanie danych JSON co ~500ms
"""

import board
import busio
import digitalio
import pwmio
import time
import json
import sys
import supervisor
import adafruit_max31856

# ─── SPI + czujniki ───────────────────────────────────────────────────────────
spi = busio.SPI(board.SCK, board.MOSI, board.MISO)

cs1 = digitalio.DigitalInOut(board.D9)
cs2 = digitalio.DigitalInOut(board.D10)
cs1.direction = digitalio.Direction.OUTPUT
cs2.direction = digitalio.Direction.OUTPUT
cs1.value = True
cs2.value = True

sensor1 = adafruit_max31856.MAX31856(spi, cs1)
sensor2 = adafruit_max31856.MAX31856(spi, cs2)

# ─── Sterownik silnika ────────────────────────────────────────────────────────
# Peltier: DIR1=3, PWM1=4
peltier_dir = digitalio.DigitalInOut(board.D3)
peltier_dir.direction = digitalio.Direction.OUTPUT
peltier_pwm = pwmio.PWMOut(board.D4, frequency=5000, duty_cycle=0)

# Wentylator: DIR2=5, PWM2=11
fan_dir = digitalio.DigitalInOut(board.D5)
fan_dir.direction = digitalio.Direction.OUTPUT
fan_pwm = pwmio.PWMOut(board.D11, frequency=5000, duty_cycle=0)

# ─── Stan systemu ─────────────────────────────────────────────────────────────
state = {
    "setpoint": 25.0,       # [°C] docelowa temperatura
    "kp": 5.0,              # współczynnik proporcjonalny
    "ki": 0.1,              # współczynnik całkujący
    "kd": 1.0,              # współczynnik różniczkujący
    "pid_enabled": False,   # PID aktywny
    "fan_manual": 0,        # ręczna moc wentylatora 0-100%
    "fan_auto": True,       # wentylator automatyczny
    "heat_mode": True,      # True=grzanie, False=chłodzenie
}

pid = {
    "integral": 0.0,
    "prev_error": 0.0,
    "prev_time": time.monotonic(),
}

MAX_INTEGRAL = 100.0   # anti-windup

def set_peltier(power_pct, heat=True):
    """Ustaw moc Peltiera. power_pct: 0–100, heat: True=grzanie."""
    power_pct = max(0.0, min(100.0, power_pct))
    peltier_dir.value = heat
    duty = int(power_pct / 100.0 * 65535)
    peltier_pwm.duty_cycle = duty

def set_fan(power_pct):
    """Ustaw moc wentylatora. power_pct: 0–100."""
    power_pct = max(0.0, min(100.0, power_pct))
    fan_dir.value = True
    duty = int(power_pct / 100.0 * 65535)
    fan_pwm.duty_cycle = duty

def read_temps():
    """Odczytaj temperatury z obu czujników. Zwraca (t1, t2) lub None przy błędzie."""
    try:
        t1 = sensor1.temperature
    except Exception:
        t1 = None
    try:
        t2 = sensor2.temperature
    except Exception:
        t2 = None
    return t1, t2

def compute_pid(temp, now):
    """Oblicz wyjście PID. Zwraca output 0–100."""
    dt = now - pid["prev_time"]
    if dt <= 0:
        return 0.0

    error = state["setpoint"] - temp
    pid["integral"] += error * dt
    pid["integral"] = max(-MAX_INTEGRAL, min(MAX_INTEGRAL, pid["integral"]))
    derivative = (error - pid["prev_error"]) / dt

    output = (state["kp"] * error +
              state["ki"] * pid["integral"] +
              state["kd"] * derivative)

    pid["prev_error"] = error
    pid["prev_time"] = now

    return max(0.0, min(100.0, output))

def process_command(cmd_str):
    """Przetwórz komendę JSON od PC."""
    try:
        cmd = json.loads(cmd_str.strip())
    except Exception:
        return

    for key in ("setpoint", "kp", "ki", "kd"):
        if key in cmd:
            state[key] = float(cmd[key])

    if "pid_enabled" in cmd:
        state["pid_enabled"] = bool(cmd["pid_enabled"])
        if not state["pid_enabled"]:
            set_peltier(0)
            pid["integral"] = 0.0
            pid["prev_error"] = 0.0

    if "fan_manual" in cmd:
        state["fan_manual"] = float(cmd["fan_manual"])

    if "fan_auto" in cmd:
        state["fan_auto"] = bool(cmd["fan_auto"])

    if "heat_mode" in cmd:
        state["heat_mode"] = bool(cmd["heat_mode"])

    if cmd.get("reset_pid"):
        pid["integral"] = 0.0
        pid["prev_error"] = 0.0

# ─── Główna pętla ─────────────────────────────────────────────────────────────
REPORT_INTERVAL = 0.5  # sekundy
last_report = 0.0
usb_buf = ""

peltier_power = 0.0
fan_power = 0.0

while True:
    now = time.monotonic()

    # Odczyt komendy z USB Serial (nieblokujący)
    if supervisor.runtime.serial_bytes_available:
        chunk = sys.stdin.read(supervisor.runtime.serial_bytes_available)
        usb_buf += chunk
        while "\n" in usb_buf:
            line, usb_buf = usb_buf.split("\n", 1)
            process_command(line)

    # Raport do PC
    if now - last_report >= REPORT_INTERVAL:
        last_report = now
        t1, t2 = read_temps()

        # Wybierz temperaturę do regulacji (średnia, jeśli oba OK)
        valid_temps = [t for t in (t1, t2) if t is not None]
        temp_ctrl = sum(valid_temps) / len(valid_temps) if valid_temps else None

        # PID
        if state["pid_enabled"] and temp_ctrl is not None:
            pid["prev_time"] = pid["prev_time"] or now
            peltier_power = compute_pid(temp_ctrl, now)
            set_peltier(peltier_power, state["heat_mode"])
        elif not state["pid_enabled"]:
            peltier_power = 0.0

        # Wentylator
        if state["fan_auto"] and temp_ctrl is not None:
            # Auto: liniowo 0–100% przy 0–20°C powyżej setpointu
            delta = abs(temp_ctrl - state["setpoint"])
            fan_power = min(100.0, delta * 5.0)
        else:
            fan_power = state["fan_manual"]
        set_fan(fan_power)

        # Wyślij JSON do PC
        data = {
            "t1": round(t1, 2) if t1 is not None else None,
            "t2": round(t2, 2) if t2 is not None else None,
            "setpoint": state["setpoint"],
            "peltier_pct": round(peltier_power, 1),
            "fan_pct": round(fan_power, 1),
            "pid_on": state["pid_enabled"],
            "heat_mode": state["heat_mode"],
            "ts": now,
        }
        sys.stdout.write(json.dumps(data) + "\n")
