name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Skonfiguruj Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Zainstaluj zaleznosci
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pyserial matplotlib pyinstaller

      - name: Zbuduj EXE
        run: |
          pyinstaller --onefile --windowed --name PeltierPID app/main.py

      - name: Zapisz EXE jako Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PeltierPID-Windows
          path: dist/PeltierPID.exe
